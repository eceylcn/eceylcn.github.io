<!DOCTYPE html>
<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Keşif Seferi</title>
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; -webkit-tap-highlight-color: transparent; }
  html, body {
    height: 100%;
    overflow: hidden;
    font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", system-ui, sans-serif;
    color: #2D1B0E;
    user-select: none;
  }
  body {
    display: flex;
    align-items: center;
    justify-content: center;
    background: linear-gradient(135deg, #7C2D12 0%, #2A0E02 100%);
    min-height: 100vh;
    padding: 20px;
  }
  #app {
    width: 390px;
    height: 780px;
    max-height: 95vh;
    position: relative;
    overflow: hidden;
    background: linear-gradient(180deg, #FFF7ED 0%, #FFE8D1 100%);
    border-radius: 36px;
    box-shadow: 0 25px 60px rgba(0,0,0,0.4);
  }
  .screen {
    position: absolute;
    inset: 0;
    display: flex;
    flex-direction: column;
    padding: 12px;
    overflow-y: auto;
    overflow-x: hidden;
  }
  .hidden { display: none !important; }

  /* MENU */
  .menu-card {
    background: white;
    border-radius: 28px;
    padding: 28px 22px;
    box-shadow: 0 8px 24px rgba(255, 138, 61, 0.18);
    text-align: center;
    margin: auto 0;
  }
  .menu-emoji { font-size: 56px; margin-bottom: 8px; }
  .menu-title {
    font-size: 26px;
    font-weight: 800;
    color: #C2410C;
    margin-bottom: 6px;
  }
  .menu-sub {
    font-size: 14px;
    color: #78716C;
    margin-bottom: 22px;
    line-height: 1.4;
  }
  .menu-rounds {
    display: flex;
    flex-direction: column;
    gap: 10px;
    margin-bottom: 22px;
  }
  .round-row {
    display: flex;
    align-items: center;
    gap: 12px;
    background: #FFF7ED;
    border: 2px solid #FED7AA;
    border-radius: 16px;
    padding: 12px 14px;
    text-align: left;
  }
  .round-row .num {
    background: #FB923C;
    color: white;
    font-weight: 800;
    width: 32px;
    height: 32px;
    border-radius: 50%;
    display: grid;
    place-items: center;
    font-size: 14px;
    flex-shrink: 0;
  }
  .round-row .info { flex: 1; }
  .round-row .name { font-weight: 700; font-size: 14px; color: #2D1B0E; }
  .round-row .meta { font-size: 11px; color: #78716C; margin-top: 2px; }
  .round-row .badge { font-size: 22px; }

  .btn-primary {
    background: linear-gradient(180deg, #FB923C 0%, #EA580C 100%);
    color: white;
    border: none;
    padding: 16px 28px;
    border-radius: 18px;
    font-size: 17px;
    font-weight: 800;
    cursor: pointer;
    box-shadow: 0 4px 0 #C2410C, 0 6px 16px rgba(234, 88, 12, 0.3);
    width: 100%;
    transition: transform 0.08s, box-shadow 0.08s;
  }
  .btn-primary:active {
    transform: translateY(3px);
    box-shadow: 0 1px 0 #C2410C, 0 3px 8px rgba(234, 88, 12, 0.3);
  }
  .btn-secondary {
    background: white;
    color: #C2410C;
    border: 2px solid #FED7AA;
    padding: 12px 20px;
    border-radius: 14px;
    font-size: 14px;
    font-weight: 700;
    cursor: pointer;
    margin-top: 10px;
  }

  /* HUD */
  .hud {
    display: flex;
    justify-content: space-between;
    align-items: center;
    margin-bottom: 8px;
    flex-shrink: 0;
  }
  .hud-counter {
    background: white;
    padding: 8px 14px;
    border-radius: 14px;
    font-size: 13px;
    font-weight: 800;
    color: #C2410C;
    box-shadow: 0 2px 6px rgba(255, 138, 61, 0.15);
  }
  .hud-back {
    background: white;
    border: none;
    width: 38px;
    height: 38px;
    border-radius: 12px;
    font-size: 18px;
    cursor: pointer;
    box-shadow: 0 2px 6px rgba(255, 138, 61, 0.15);
    color: #78716C;
  }
  .hud-progress {
    flex: 1;
    height: 8px;
    background: #FED7AA;
    border-radius: 4px;
    margin: 0 12px;
    overflow: hidden;
  }
  .hud-progress-fill {
    height: 100%;
    background: linear-gradient(90deg, #FB923C, #EA580C);
    border-radius: 4px;
    transition: width 0.4s ease;
  }

  .instruction {
    background: #FEF3C7;
    border: 2px solid #FBBF24;
    border-radius: 14px;
    padding: 7px 12px;
    font-size: 12px;
    font-weight: 600;
    color: #92400E;
    text-align: center;
    margin-bottom: 8px;
    flex-shrink: 0;
  }

  /* ROUND INTRO */
  .intro-card {
    background: white;
    border-radius: 28px;
    padding: 32px 22px;
    text-align: center;
    margin: auto 0;
    box-shadow: 0 8px 24px rgba(255, 138, 61, 0.18);
  }
  .intro-emoji { font-size: 72px; margin-bottom: 12px; }
  .intro-round { font-size: 14px; color: #FB923C; font-weight: 800; letter-spacing: 1px; }
  .intro-title { font-size: 24px; font-weight: 800; color: #2D1B0E; margin: 6px 0 12px; }
  .intro-desc { font-size: 14px; color: #78716C; line-height: 1.5; margin-bottom: 24px; }

  /* ROUND 1 - KROKI */
  .map-card {
    background: white;
    border-radius: 20px;
    padding: 8px;
    box-shadow: 0 4px 12px rgba(255, 138, 61, 0.15);
    margin-bottom: 10px;
    flex-shrink: 0;
  }
  .map-svg {
    width: 100%;
    height: auto;
    display: block;
    border-radius: 12px;
  }
  .question-card {
    background: white;
    border-radius: 20px;
    padding: 12px;
    box-shadow: 0 4px 12px rgba(255, 138, 61, 0.15);
    flex-shrink: 0;
  }
  .question-text {
    font-size: 14px;
    font-weight: 700;
    color: #2D1B0E;
    text-align: center;
    margin-bottom: 10px;
    line-height: 1.35;
  }
  .direction-grid {
    display: grid;
    grid-template-columns: repeat(4, 1fr);
    gap: 6px;
  }
  .dir-btn {
    background: #FFF7ED;
    border: 2px solid #FED7AA;
    border-radius: 12px;
    padding: 8px 4px;
    font-size: 11px;
    font-weight: 700;
    color: #C2410C;
    cursor: pointer;
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 3px;
    transition: transform 0.1s;
  }
  .dir-btn:active { transform: scale(0.96); }
  .dir-btn.correct {
    background: #BBF7D0;
    border-color: #16A34A;
    color: #14532D;
    animation: pop 0.4s;
  }
  .dir-btn.wrong {
    background: #FECACA;
    border-color: #DC2626;
    color: #7F1D1D;
    animation: shake 0.4s;
  }
  .dir-arrow svg { width: 22px; height: 22px; }
  @keyframes pop {
    0% { transform: scale(1); }
    50% { transform: scale(1.1); }
    100% { transform: scale(1); }
  }
  @keyframes shake {
    0%, 100% { transform: translateX(0); }
    25% { transform: translateX(-6px); }
    75% { transform: translateX(6px); }
  }

  /* ROUND 2 - SURUKLE */
  .drop-zones {
    display: grid;
    grid-template-columns: 1fr 1fr;
    gap: 10px;
    margin-bottom: 16px;
    flex-shrink: 0;
  }
  .drop-zone {
    border-radius: 18px;
    padding: 12px 8px;
    min-height: 110px;
    text-align: center;
    border: 3px dashed transparent;
    transition: all 0.2s;
    display: flex;
    flex-direction: column;
  }
  .drop-zone.natural {
    background: #DCFCE7;
    border-color: #86EFAC;
  }
  .drop-zone.human {
    background: #FED7AA;
    border-color: #FDBA74;
  }
  .drop-zone.over { transform: scale(1.04); border-style: solid; }
  .drop-zone-title {
    font-size: 12px;
    font-weight: 800;
    margin-bottom: 6px;
  }
  .drop-zone.natural .drop-zone-title { color: #15803D; }
  .drop-zone.human .drop-zone-title { color: #C2410C; }
  .drop-items {
    display: flex;
    flex-wrap: wrap;
    gap: 4px;
    justify-content: center;
    align-items: flex-start;
    flex: 1;
  }
  .drop-item {
    background: white;
    padding: 4px 8px;
    border-radius: 8px;
    font-size: 10px;
    font-weight: 700;
    color: #2D1B0E;
    display: flex;
    align-items: center;
    gap: 3px;
    animation: pop 0.3s;
  }
  .drop-item svg { width: 16px; height: 16px; }
  .draggable-area {
    flex: 1;
    display: flex;
    align-items: center;
    justify-content: center;
    min-height: 0;
  }
  .draggable-card {
    background: white;
    border-radius: 24px;
    padding: 20px;
    box-shadow: 0 8px 20px rgba(255, 138, 61, 0.2);
    text-align: center;
    cursor: grab;
    touch-action: none;
    transition: transform 0.2s, box-shadow 0.2s;
    width: 200px;
  }
  .draggable-card:active { cursor: grabbing; }
  .draggable-card.dragging {
    box-shadow: 0 12px 30px rgba(255, 138, 61, 0.4);
    z-index: 100;
    transition: none;
  }
  .draggable-card svg {
    width: 100px;
    height: 100px;
    display: block;
    margin: 0 auto 8px;
  }
  .draggable-card .label {
    font-size: 16px;
    font-weight: 800;
    color: #2D1B0E;
  }
  .dots {
    display: flex;
    gap: 6px;
    justify-content: center;
    margin-top: 12px;
    flex-shrink: 0;
  }
  .dot {
    width: 8px;
    height: 8px;
    border-radius: 50%;
    background: #FED7AA;
  }
  .dot.done { background: #16A34A; }
  .dot.active { background: #FB923C; transform: scale(1.4); }

  /* ROUND 3 - HAVA */
  .weather-layout {
    flex: 1;
    display: flex;
    gap: 8px;
    overflow: hidden;
    min-height: 0;
  }
  .weather-icons {
    display: flex;
    flex-direction: column;
    gap: 6px;
    flex-shrink: 0;
    width: 64px;
  }
  .weather-icon {
    background: white;
    border-radius: 14px;
    padding: 6px;
    box-shadow: 0 2px 6px rgba(255, 138, 61, 0.15);
    cursor: grab;
    touch-action: none;
    text-align: center;
    transition: transform 0.15s;
  }
  .weather-icon:active { cursor: grabbing; }
  .weather-icon.dragging { box-shadow: 0 8px 20px rgba(255, 138, 61, 0.35); z-index: 100; }
  .weather-icon svg { width: 36px; height: 36px; display: block; margin: 0 auto; }
  .weather-icon .name {
    font-size: 9px;
    font-weight: 700;
    color: #78716C;
    margin-top: 2px;
  }
  .weather-icon.used {
    opacity: 0.3;
    pointer-events: none;
  }

  .day-cards {
    flex: 1;
    display: flex;
    flex-direction: column;
    gap: 6px;
    overflow-y: auto;
    padding-right: 4px;
  }
  .day-card {
    background: white;
    border-radius: 14px;
    padding: 8px 10px;
    box-shadow: 0 2px 6px rgba(255, 138, 61, 0.12);
    display: flex;
    align-items: center;
    gap: 8px;
    border: 2px dashed transparent;
    transition: all 0.2s;
    flex-shrink: 0;
  }
  .day-card.over {
    border-color: #FB923C;
    background: #FFF7ED;
    transform: scale(1.02);
  }
  .day-card.filled {
    background: #DCFCE7;
    border-color: #86EFAC;
  }
  .day-info { flex: 1; min-width: 0; }
  .day-name {
    font-size: 11px;
    font-weight: 800;
    color: #C2410C;
  }
  .day-text {
    font-size: 10px;
    color: #57534E;
    line-height: 1.3;
    margin-top: 1px;
  }
  .day-slot {
    width: 42px;
    height: 42px;
    border-radius: 10px;
    background: #FFF7ED;
    border: 2px dashed #FED7AA;
    display: grid;
    place-items: center;
    flex-shrink: 0;
  }
  .day-slot svg { width: 28px; height: 28px; }
  .day-card.filled .day-slot { background: white; border-style: solid; border-color: #16A34A; }

  /* CHART */
  .chart-card {
    background: white;
    border-radius: 24px;
    padding: 20px 16px;
    box-shadow: 0 8px 20px rgba(255, 138, 61, 0.18);
    margin: auto 0;
    text-align: center;
  }
  .chart-title {
    font-size: 18px;
    font-weight: 800;
    color: #C2410C;
    margin-bottom: 6px;
  }
  .chart-sub {
    font-size: 12px;
    color: #78716C;
    margin-bottom: 18px;
  }
  .chart {
    display: flex;
    align-items: flex-end;
    justify-content: space-around;
    height: 180px;
    border-bottom: 3px solid #FB923C;
    padding: 0 4px;
    margin-bottom: 8px;
  }
  .chart-bar-wrap {
    display: flex;
    flex-direction: column;
    align-items: center;
    gap: 4px;
    flex: 1;
  }
  .chart-bar-count {
    font-size: 13px;
    font-weight: 800;
    color: #2D1B0E;
  }
  .chart-bar {
    width: 100%;
    max-width: 36px;
    border-radius: 6px 6px 0 0;
    transition: height 0.8s cubic-bezier(0.34, 1.56, 0.64, 1);
    height: 0;
  }
  .chart-labels {
    display: flex;
    justify-content: space-around;
    padding: 0 4px;
    margin-bottom: 18px;
  }
  .chart-label {
    flex: 1;
    text-align: center;
  }
  .chart-label svg {
    width: 26px;
    height: 26px;
  }

  /* BADGE MODAL */
  .badge-overlay {
    position: absolute;
    inset: 0;
    background: rgba(0, 0, 0, 0.5);
    display: flex;
    align-items: center;
    justify-content: center;
    z-index: 200;
    padding: 20px;
    backdrop-filter: blur(4px);
  }
  .badge-card {
    background: white;
    border-radius: 28px;
    padding: 32px 24px;
    text-align: center;
    box-shadow: 0 20px 50px rgba(0, 0, 0, 0.3);
    max-width: 340px;
    width: 100%;
    animation: badge-in 0.6s cubic-bezier(0.34, 1.56, 0.64, 1);
  }
  @keyframes badge-in {
    0% { transform: scale(0.5) rotate(-10deg); opacity: 0; }
    100% { transform: scale(1) rotate(0); opacity: 1; }
  }
  .badge-celebration {
    font-size: 14px;
    font-weight: 800;
    color: #FB923C;
    letter-spacing: 1px;
    margin-bottom: 4px;
  }
  .badge-emoji {
    font-size: 80px;
    margin: 8px 0;
    animation: badge-bounce 1.2s infinite;
    display: inline-block;
  }
  @keyframes badge-bounce {
    0%, 100% { transform: translateY(0); }
    50% { transform: translateY(-8px); }
  }
  .badge-name {
    font-size: 22px;
    font-weight: 800;
    color: #2D1B0E;
    margin-bottom: 8px;
  }
  .badge-desc {
    font-size: 14px;
    color: #78716C;
    line-height: 1.5;
    margin-bottom: 24px;
  }

  /* FINAL */
  .final-card {
    background: white;
    border-radius: 28px;
    padding: 28px 22px;
    text-align: center;
    margin: auto 0;
    box-shadow: 0 8px 24px rgba(255, 138, 61, 0.18);
  }
  .final-title {
    font-size: 24px;
    font-weight: 800;
    color: #C2410C;
    margin: 8px 0 4px;
  }
  .final-sub {
    font-size: 14px;
    color: #78716C;
    margin-bottom: 22px;
  }
  .badges-collection {
    display: flex;
    justify-content: center;
    gap: 10px;
    margin-bottom: 22px;
    flex-wrap: wrap;
  }
  .collected-badge {
    background: linear-gradient(135deg, #FFF7ED, #FED7AA);
    border-radius: 18px;
    padding: 14px 10px;
    flex: 1;
    min-width: 90px;
    max-width: 110px;
  }
  .collected-badge .e { font-size: 36px; }
  .collected-badge .n {
    font-size: 11px;
    font-weight: 800;
    color: #C2410C;
    margin-top: 4px;
    line-height: 1.2;
  }

  .toast {
    position: absolute;
    bottom: 24px;
    left: 50%;
    transform: translateX(-50%);
    background: #16A34A;
    color: white;
    padding: 10px 18px;
    border-radius: 14px;
    font-weight: 700;
    font-size: 13px;
    box-shadow: 0 6px 16px rgba(22, 163, 74, 0.4);
    z-index: 150;
    animation: toast-in 0.3s;
    pointer-events: none;
  }
  .toast.error { background: #DC2626; box-shadow: 0 6px 16px rgba(220, 38, 38, 0.4); }
  @keyframes toast-in {
    0% { opacity: 0; transform: translate(-50%, 20px); }
    100% { opacity: 1; transform: translate(-50%, 0); }
  }

  /* Map arrow animation */
  .arrow-line { stroke-dasharray: 200; stroke-dashoffset: 200; animation: draw 0.8s forwards; }
  @keyframes draw { to { stroke-dashoffset: 0; } }
</style>
</head>
<body>
<div id="app"></div>

<script>
'use strict';

// ============ STATE ============
const state = {
  screen: 'menu',
  round: 0,
  badges: [],
  r1: { qIdx: 0, locked: false },
  r2: { itemIdx: 0 },
  r3: { filled: 0, days: {} }
};

// ============ HAPTICS ============
function buzz(ms = 30) {
  if (navigator.vibrate) navigator.vibrate(ms);
}

// ============ ROUND 1 DATA ============
const R1_QUESTIONS = [
  { q: 'Okul, ormanın hangi yönündedir?', from: 'park', to: 'okul', answer: 'kuzey' },
  { q: 'Hastane, marketin hangi yönündedir?', from: 'market', to: 'hastane', answer: 'doğu' },
  { q: 'Ev, ırmağın hangi yönündedir?', from: 'irmak', to: 'ev', answer: 'doğu' },
  { q: 'Oyun parkı, okulun hangi yönündedir?', from: 'okul', to: 'oyunparki', answer: 'batı' },
  { q: 'Market, hastanenin hangi yönündedir?', from: 'hastane', to: 'market', answer: 'batı' }
];

// Coordinates on the 360x300 map for arrow drawing — clean grid, each pair used
// by a question shares either the same x (N/S) or same y (E/W) so the answer
// is always an unambiguous cardinal direction.
const MAP_COORDS = {
  okul:       { x: 185, y: 65  },
  park:       { x: 185, y: 245 },
  market:     { x: 70,  y: 165 },
  hastane:    { x: 300, y: 165 },
  ev:         { x: 300, y: 245 },
  oyunparki:  { x: 70,  y: 65  },
  irmak:      { x: 25,  y: 245 }
};

// ============ ROUND 2 DATA ============
const R2_ITEMS = [
  { name: 'Dağ', type: 'natural', svg: 'mountain' },
  { name: 'Köprü', type: 'human', svg: 'bridge' },
  { name: 'Irmak', type: 'natural', svg: 'river' },
  { name: 'Ev', type: 'human', svg: 'house' },
  { name: 'Orman', type: 'natural', svg: 'forest' },
  { name: 'Yol', type: 'human', svg: 'road' },
  { name: 'Göl', type: 'natural', svg: 'lake' },
  { name: 'Baraj', type: 'human', svg: 'dam' }
];

// ============ ROUND 3 DATA ============
const R3_DAYS = [
  { name: 'Pazartesi', text: 'Sabah güneş açtı, çocuklar parka gitti.', answer: 'gunesli' },
  { name: 'Salı', text: 'Bulutlar gökyüzünü kapladı, ama yağmur yağmadı.', answer: 'bulutlu' },
  { name: 'Çarşamba', text: 'Tüm gün yağmur yağdı, şemsiye lazımdı.', answer: 'yagmurlu' },
  { name: 'Perşembe', text: 'Sabah güneş, öğlen bulut vardı.', answer: 'parcali' },
  { name: 'Cuma', text: 'Hava soğudu, kar tanesi yağmaya başladı.', answer: 'karli' }
];

const R3_WEATHER = [
  { id: 'gunesli', name: 'Güneşli', svg: 'sun', color: '#FBBF24' },
  { id: 'parcali', name: 'Parçalı', svg: 'partly', color: '#94A3B8' },
  { id: 'bulutlu', name: 'Bulutlu', svg: 'cloud', color: '#64748B' },
  { id: 'yagmurlu', name: 'Yağmurlu', svg: 'rain', color: '#3B82F6' },
  { id: 'karli', name: 'Karlı', svg: 'snow', color: '#7DD3FC' }
];

// ============ SVG LIBRARY ============
const SVGS = {

window.answerR1 = (dir) => {
  if (state.r1.locked) return;
  const q = R1_QUESTIONS[state.r1.qIdx];
  const dirKey = dir === 'kuzey' ? 'kuzey' : dir === 'doğu' ? 'dogu' : dir === 'batı' ? 'bati' : 'guney';
  const btn = document.querySelector(`.dir-btn[data-dir="${dirKey}"]`);
  if (dir === q.answer) {
    state.r1.locked = true;
    btn.classList.add('correct');
    buzz(40);
    showToast('✓ Doğru!');
    // redraw map with arrow
    const mapCard = document.querySelector('.map-card');
    mapCard.innerHTML = buildMapSVG({ from: q.from, to: q.to });
    setTimeout(() => {
      state.r1.qIdx++;
      state.r1.locked = false;
      if (state.r1.qIdx >= 5) {
        state.badges.push({ emoji: '🗺️', name: 'Yön Bulucu', desc: 'Krokiyi okumayı öğrendin! Mahallenin yönünü buluyorsun.' });
        showBadge(0, () => { state.round = 2; state.screen = 'intro'; render(); });
      } else {
        render();
      }
    }, 1500);
  } else {
    btn.classList.add('wrong');
    buzz([50, 30, 50]);
    showToast('Tekrar dene!', true);
    setTimeout(() => btn.classList.remove('wrong'), 1100);
  }
};

function setupR2Drag() {
  const card = document.getElementById('dragCard');
  if (!card) return;
  let startX, startY, origX, origY, dragging = false;
  const startRect = card.getBoundingClientRect();
  origX = startRect.left;
  origY = startRect.top;

  function onStart(e) {
    const t = e.touches ? e.touches[0] : e;
    startX = t.clientX;
    startY = t.clientY;
    dragging = true;
    card.classList.add('dragging');
    const r = card.getBoundingClientRect();
    card.style.position = 'fixed';
    card.style.left = r.left + 'px';
    card.style.top = r.top + 'px';
    card.style.width = r.width + 'px';
    card.style.pointerEvents = 'none'; // so elementFromPoint can see the drop zone underneath, not the card itself
    document.addEventListener('mousemove', onMove);
    document.addEventListener('touchmove', onMove, { passive: false });
    document.addEventListener('mouseup', onEnd);
    document.addEventListener('touchend', onEnd);
    e.preventDefault();
  }

  function onMove(e) {
    if (!dragging) return;
    e.preventDefault();
    const t = e.touches ? e.touches[0] : e;
    const dx = t.clientX - startX;
    const dy = t.clientY - startY;
    const r = card.getBoundingClientRect();
    card.style.left = (origX + dx) + 'px';
    card.style.top = (origY + dy) + 'px';

    // hover detection
    document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('over'));
    const target = document.elementFromPoint(t.clientX, t.clientY);
    const zone = target?.closest('.drop-zone');
    if (zone) zone.classList.add('over');
  }

  function onEnd(e) {
    if (!dragging) return;
    dragging = false;
    document.removeEventListener('mousemove', onMove);
    document.removeEventListener('touchmove', onMove);
    document.removeEventListener('mouseup', onEnd);
    document.removeEventListener('touchend', onEnd);

    const t = e.changedTouches ? e.changedTouches[0] : e;
    const target = document.elementFromPoint(t.clientX, t.clientY);
    const zone = target?.closest('.drop-zone');
    document.querySelectorAll('.drop-zone').forEach(z => z.classList.remove('over'));

    const item = R2_ITEMS[state.r2.itemIdx];
    if (zone && zone.dataset.zone === item.type) {
      buzz(40);
      showToast('✓ Doğru!');
      state.r2.itemIdx++;
      setTimeout(() => {
        if (state.r2.itemIdx >= 8) {
          state.badges.push({ emoji: '🌳', name: 'Çevre Gözcüsü', desc: 'Doğal ve beşeri unsurları ayırt ettin!' });
          showBadge(1, () => { state.round = 3; state.screen = 'intro'; render(); });
        } else {
          render();
        }
      }, 400);
    } else if (zone) {
      buzz([50, 30, 50]);
      showToast('Tekrar dene!', true);
      card.style.position = '';
      card.style.left = '';
      card.style.top = '';
      card.style.width = '';
      card.style.pointerEvents = '';
      card.classList.remove('dragging');
      card.classList.add('wrong');
      setTimeout(() => card.classList.remove('wrong'), 500);
    } else {
      card.style.position = '';
      card.style.left = '';
      card.style.top = '';
      card.style.width = '';
      card.style.pointerEvents = '';
      card.classList.remove('dragging');
    }
  }

  card.addEventListener('mousedown', onStart);
  card.addEventListener('touchstart', onStart, { passive: false });
}

// ============ ROUND 3 ============
function renderR3() {
  app.innerHTML = `
    <div class="screen">
      <div class="hud">
        <div class="hud-counter">${state.r3.filled} / 5 gün</div>
        <div class="hud-progress"><div class="hud-progress-fill" style="width:${(state.r3.filled / 5) * 100}%"></div></div>
        <div style="width: 38px;"></div>
      </div>
      <div class="instruction">📖 Cümleyi oku. Doğru hava ikonunu güne yerleştir!</div>
      <div class="weather-layout">
        <div class="weather-icons">
          ${R3_WEATHER.map(w => {
            const used = Object.values(state.r3.days).includes(w.id);
            return `<div class="weather-icon ${used ? 'used' : ''}" data-weather="${w.id}">
              ${SVGS[w.svg]}
              <div class="name">${w.name}</div>
            </div>`;
          }).join('')}
        </div>
        <div class="day-cards">
          ${R3_DAYS.map((d, i) => {
            const filled = state.r3.days[i];
            const w = R3_WEATHER.find(x => x.id === filled);
            return `<div class="day-card ${filled ? 'filled' : ''}" data-day="${i}">
              <div class="day-info">
                <div class="day-name">${d.name}</div>
                <div class="day-text">${d.text}</div>
              </div>
              <div class="day-slot">${w ? SVGS[w.svg] : ''}</div>
            </div>`;
          }).join('')}
        </div>
      </div>
    </div>
  `;
  setupR3Drag();
}

function setupR3Drag() {
  document.querySelectorAll('.weather-icon:not(.used)').forEach(icon => {
    let startX, startY, dragging = false, ghost = null;

    function onStart(e) {
      const t = e.touches ? e.touches[0] : e;
      startX = t.clientX;
      startY = t.clientY;
      dragging = true;
      const r = icon.getBoundingClientRect();
      ghost = icon.cloneNode(true);
      ghost.classList.add('dragging');
      ghost.style.position = 'fixed';
      ghost.style.left = r.left + 'px';
      ghost.style.top = r.top + 'px';
      ghost.style.width = r.width + 'px';
      ghost.style.pointerEvents = 'none';
      document.body.appendChild(ghost);
      icon.style.opacity = '0.3';

      document.addEventListener('mousemove', onMove);
      document.addEventListener('touchmove', onMove, { passive: false });
      document.addEventListener('mouseup', onEnd);
      document.addEventListener('touchend', onEnd);
      e.preventDefault();
    }

    function onMove(e) {
      if (!dragging) return;
      e.preventDefault();
      const t = e.touches ? e.touches[0] : e;
      const r = icon.getBoundingClientRect();
      const dx = t.clientX - startX;
      const dy = t.clientY - startY;
      ghost.style.left = (r.left + dx) + 'px';
      ghost.style.top = (r.top + dy) + 'px';

      document.querySelectorAll('.day-card').forEach(d => d.classList.remove('over'));
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const dayCard = target?.closest('.day-card');
      if (dayCard && !dayCard.classList.contains('filled')) dayCard.classList.add('over');
    }

    function onEnd(e) {
      if (!dragging) return;
      dragging = false;
      document.removeEventListener('mousemove', onMove);
      document.removeEventListener('touchmove', onMove);
      document.removeEventListener('mouseup', onEnd);
      document.removeEventListener('touchend', onEnd);

      const t = e.changedTouches ? e.changedTouches[0] : e;
      const target = document.elementFromPoint(t.clientX, t.clientY);
      const dayCard = target?.closest('.day-card');
      document.querySelectorAll('.day-card').forEach(d => d.classList.remove('over'));

      if (ghost) { ghost.remove(); ghost = null; }
      icon.style.opacity = '';

      if (dayCard && !dayCard.classList.contains('filled')) {
        const dayIdx = parseInt(dayCard.dataset.day);
        const weatherId = icon.dataset.weather;
        if (R3_DAYS[dayIdx].answer === weatherId) {
          state.r3.days[dayIdx] = weatherId;
          state.r3.filled++;
          buzz(40);
          showToast('✓ Doğru!');
          if (state.r3.filled >= 5) {
            setTimeout(() => { state.screen = 'chart'; render(); }, 600);
          } else {
            render();
          }
        } else {
          buzz([50, 30, 50]);
          showToast('Tekrar dene!', true);
          dayCard.style.animation = 'shake 0.4s';
          setTimeout(() => dayCard.style.animation = '', 400);
        }
      }
    }

    icon.addEventListener('mousedown', onStart);
    icon.addEventListener('touchstart', onStart, { passive: false });
  });
}

// ============ CHART ============
function renderChart() {
  // Count weather types
  const counts = {};
  R3_WEATHER.forEach(w => counts[w.id] = 0);
  Object.values(state.r3.days).forEach(id => counts[id]++);
  const max = 1; // max 1 each, all unique

  app.innerHTML = `
    <div class="screen">
      <div class="chart-card">
        <div class="chart-title">📊 Hafta Hava Grafiği</div>
        <div class="chart-sub">Bir haftalık gözlemini grafiğe aktardın!</div>
        <div class="chart" id="chart">
          ${R3_WEATHER.map(w => `
            <div class="chart-bar-wrap">
              <div class="chart-bar-count">${counts[w.id]}</div>
              <div class="chart-bar" data-weather="${w.id}" style="background: ${w.color}; height: 0;"></div>
            </div>
          `).join('')}
        </div>
        <div class="chart-labels">
          ${R3_WEATHER.map(w => `<div class="chart-label">${SVGS[w.svg]}</div>`).join('')}
        </div>
        <button class="btn-primary" onclick="finishR3()">Devam Et</button>
      </div>
    </div>
  `;
  // Animate bars
  setTimeout(() => {
    R3_WEATHER.forEach(w => {
      const bar = document.querySelector(`.chart-bar[data-weather="${w.id}"]`);
      if (bar) bar.style.height = (counts[w.id] * 130) + 'px';
    });
  }, 100);
}

window.finishR3 = () => {
  state.badges.push({ emoji: '☀️', name: 'Hava Takipçisi', desc: 'Bir haftalık havayı izledin ve grafiğe aktardın!' });
  showBadge(2, () => { state.screen = 'final'; render(); });
};

// ============ BADGE MODAL ============
function showBadge(idx, cb) {
  const b = state.badges[idx];
  const overlay = document.createElement('div');
  overlay.className = 'badge-overlay';
  overlay.innerHTML = `
    <div class="badge-card">
      <div class="badge-celebration">🎉 YENİ ROZET 🎉</div>
      <div class="badge-emoji">${b.emoji}</div>
      <div class="badge-name">${b.name}</div>
      <div class="badge-desc">${b.desc}</div>
      <button class="btn-primary" id="badgeContinue">Devam Et</button>
    </div>
  `;
  app.appendChild(overlay);
  buzz([60, 50, 60, 50, 100]);
  document.getElementById('badgeContinue').onclick = () => {
    overlay.remove();
    cb();
  };
}

// ============ FINAL ============
function renderFinal() {
  app.innerHTML = `
    <div class="screen">
      <div class="final-card">
        <div style="font-size: 64px;">🏆</div>
        <div class="final-title">Tebrikler!</div>
        <div class="final-sub">Üç rozeti de kazandın. Artık çevreni daha iyi tanıyorsun!</div>
        <div class="badges-collection">
          ${state.badges.map(b => `
            <div class="collected-badge">
              <div class="e">${b.emoji}</div>
              <div class="n">${b.name}</div>
            </div>
          `).join('')}
        </div>
        <button class="btn-primary" onclick="window.startGame()">Yeniden Oyna</button>
        <button class="btn-secondary" onclick="goMenu()">Ana Menü</button>
      </div>
    </div>
  `;
}

window.goMenu = () => { state.screen = 'menu'; render(); };

// ============ TOAST ============
function showToast(msg, error = false) {
  const t = document.createElement('div');
  t.className = 'toast' + (error ? ' error' : '');
  t.textContent = msg;
  app.appendChild(t);
  setTimeout(() => t.remove(), 1200);
}

// ============ INIT ============
render();
</script>
</body>
